name: Macos

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        c_compiler: [clang]
        include:
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
    steps:
      - name: Install Dependencies
        run: |
          brew update
          brew install ccache sdl3 autoconf autoconf-archive automake libtool

      - uses: actions/checkout@v7

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          create-symlink: true
          update-package-index: false
          key: ${{ runner.os }}-${{ runner.arch }}-ccache

      - name: Configure CMake
        if: ${{ runner.os != 'linux' }}
        run: >
          cmake --preset dev_macos
          -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DBUILD_TESTING=ON

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Run Tests (Release)
        working-directory: build
        run: ctest --output-on-failure --build-config Release
